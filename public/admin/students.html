<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ученики — IT Platform</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">💻</div>
        <h2>IT Platform</h2>
        <div class="role">Панель учителя</div>
      </div>
      <ul class="nav-menu">
        <li><a href="/admin/dashboard.html"><span class="icon">📊</span> Обзор</a></li>
        <li><a href="/admin/classes.html"><span class="icon">🏫</span> Классы</a></li>
        <li><a href="/admin/students.html" class="active"><span class="icon">👨‍🎓</span> Ученики</a></li>
        <li><a href="/admin/lessons.html"><span class="icon">📚</span> Уроки</a></li>
      </ul>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">👤</div>
          <div>
            <div class="user-name" id="user-name">Учитель</div>
            <div class="user-role">Администратор</div>
          </div>
        </div>
        <button class="btn btn-secondary btn-sm btn-block" onclick="logout()">🚪 Выйти</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Все ученики</h1>
      </div>

      <div class="card">
        <div id="students-table-container">
          <div class="empty-state">
            <div class="icon">👨‍🎓</div>
            <h3>Нет учеников</h3>
            <p>Добавьте учеников в классы</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script>
    const user = getUser();
    if (!user || user.role !== 'admin') window.location.href = '/admin/';
    else document.getElementById('user-name').textContent = user.name || user.username;

    async function loadAllStudents() {
      try {
        const classes = await api('/classes');
        const container = document.getElementById('students-table-container');
        let allStudents = [];

        for (const cls of classes) {
          const students = await api('/classes/' + cls.id + '/students');
          students.forEach(s => allStudents.push({...s, className: cls.name}));
        }

        if (allStudents.length === 0) return;

        container.innerHTML = `
          <table class="data-table">
            <thead><tr><th>Фамилия</th><th>Имя</th><th>Класс</th><th>Логин</th><th>Действия</th></tr></thead>
            <tbody>${allStudents.map(s => `
              <tr>
                <td>${escapeHtml(s.lastName)}</td>
                <td>${escapeHtml(s.firstName)}</td>
                <td>${escapeHtml(s.className)}</td>
                <td><code>${escapeHtml(s.username)}</code></td>
                <td class="actions">
                  <button class="btn btn-secondary btn-sm" onclick="viewNotes('${s.id}', '${s.name}')">📝 Заметки</button>
                  <button class="btn btn-danger btn-sm" onclick="deleteStudent('${s.id}')">🗑</button>
                </td>
              </tr>
            `).join('')}</tbody>
          </table>`;
      } catch (e) {
        showToast(e.message, 'error');
      }
    }

    function viewNotes(id, name) {
      window.location.href = `/admin/student-notes.html?id=${id}&name=${encodeURIComponent(name)}`;
    }

    async function deleteStudent(id) {
      if (!confirm('Удалить ученика?')) return;
      try {
        await api('/students/' + id, { method: 'DELETE' });
        showToast('Ученик удалён', 'success');
        loadAllStudents();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadAllStudents();
  </script>
</body>
</html>
